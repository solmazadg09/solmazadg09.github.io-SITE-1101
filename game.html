<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Snake game — play in the browser" />
    <title>Game — Snake</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Raleway:wght@700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      referrerpolicy="no-referrer"
    />

    <link rel="stylesheet" href="./css/style.css" />
    <script src="./js/main.js" defer></script>
    <script src="./js/snake.js" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header">
      <nav class="nav" aria-label="Primary">
        <div class="container nav-inner">
          <a class="brand" href="./index.html" aria-label="Home">
            <span class="brand-mark grad-text">YN</span>
          </a>

          <button
            class="nav-toggle"
            id="navToggle"
            type="button"
            aria-label="Open menu"
            aria-controls="navMenu"
            aria-expanded="false"
          >
            <span class="nav-toggle-lines" aria-hidden="true">
              <span></span><span></span><span></span>
            </span>
          </button>

          <div class="nav-menu" id="navMenu">
            <ul class="nav-links">
              <li><a href="./index.html#home">Home</a></li>
              <li><a href="./projects.html">Projects</a></li>
              <li><a href="./about.html">About</a></li>
              <li><a class="active" href="./game.html" aria-current="page">🐍 Game</a></li>
              <li><a href="./index.html#contact">Contact</a></li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main id="main">
      <section class="section game-page" aria-label="Snake game">
        <div class="container">
          <div class="game-page-head">
            <h1 class="game-title grad-text">🐍 Snake</h1>
            <p class="muted">How long can you go?</p>
          </div>

          <div class="game-shell" data-snake>
            <div class="game-card">
              <div class="game-topbar" aria-label="Game status">
                <div class="game-stat" id="score">Score: 0</div>
                <div class="game-stat" id="best">Best: 0</div>
              </div>

              <div class="canvas-wrap">
                <canvas
                  id="gameCanvas"
                  width="400"
                  height="400"
                  aria-label="Snake game canvas"
                  role="img"
                ></canvas>
              </div>

              <div class="game-actions">
                <button class="game-cta" type="button" id="actionBtn">Start</button>
              </div>

              <p class="game-hint">⌨️ Arrow keys or WASD to move • Mobile: swipe</p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div class="footer-icons" aria-label="Links">
          <a class="footer-icon" href="https://github.com/solmazadg09" target="_blank" rel="noopener" aria-label="GitHub">
            <i class="fa-brands fa-github" aria-hidden="true"></i>
          </a>
          <a
            class="footer-icon"
            href="https://www.codecademy.com/profiles/solmazadg09"
            target="_blank"
            rel="noopener"
            aria-label="Codecademy Profile"
            title="Codecademy Profile"
          >
            <span class="cc-badge" aria-hidden="true">CC</span>
          </a>
          <a
            class="footer-repo"
            href="https://github.com/solmazadg09/solmazadg09.github.io-SITE-1101"
            target="_blank"
            rel="noopener"
            aria-label="Repo"
          >
            <i class="fa-brands fa-github" aria-hidden="true"></i><span>Repo</span>
          </a>
        </div>

        <div class="footer-tagline">Made with HTML, CSS &amp; JS ♥</div>
        <div>© <span id="year">2026</span> [Name]</div>
      </div>
    </footer>
  </body>
</html>
